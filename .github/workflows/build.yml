name: Build and Publish

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Override version to build (e.g., 1.85.1)'
        required: false
        type: string

env:
  GHCR_IMAGE: ghcr.io/charcoal-io/openvscode-server
  DOCKERHUB_IMAGE: bilw/openvscode-server

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_build: ${{ steps.should_build.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(curl -sX GET https://api.github.com/repos/gitpod-io/openvscode-server/releases/latest | jq -r '.tag_name' | sed 's|^openvscode-server-v||')
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if should build
        id: should_build
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "result=true" >> $GITHUB_OUTPUT
          else
            VERSION="${{ steps.version.outputs.version }}"
            if docker run --rm quay.io/skopeo/stable:v1 inspect docker://${GHCR_IMAGE}:${VERSION} 2>/dev/null; then
              echo "Version ${VERSION} already published, skipping"
              echo "result=false" >> $GITHUB_OUTPUT
            else
              echo "New version ${VERSION} detected"
              echo "result=true" >> $GITHUB_OUTPUT
            fi
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            dockerfile: Dockerfile
            platform: linux/amd64
          - arch: arm64v8
            dockerfile: Dockerfile.aarch64
            platform: linux/arm64
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push per-arch
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ matrix.arch }}-${{ needs.check.outputs.version }}
            ${{ env.DOCKERHUB_IMAGE }}:${{ matrix.arch }}-${{ needs.check.outputs.version }}
          build-args: |
            CODE_RELEASE=${{ needs.check.outputs.version }}
            VERSION=${{ needs.check.outputs.version }}
            BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%S%Z')

  manifest:
    needs: [check, build]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifests
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t ${GHCR_IMAGE}:${VERSION} \
            -t ${GHCR_IMAGE}:latest \
            ${GHCR_IMAGE}:amd64-${VERSION} \
            ${GHCR_IMAGE}:arm64v8-${VERSION}

          docker buildx imagetools create \
            -t ${DOCKERHUB_IMAGE}:${VERSION} \
            -t ${DOCKERHUB_IMAGE}:latest \
            ${DOCKERHUB_IMAGE}:amd64-${VERSION} \
            ${DOCKERHUB_IMAGE}:arm64v8-${VERSION}
